services:
  api:
    image: ttk-backend-api
    build:
      context: .
      target: development
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DATABASE_URL: postgresql://${DB_USER:-ttk_admin}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-ttk_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-with-at-least-16-characters}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET_PREFIX: ${STORAGE_BUCKET_PREFIX:-ttk}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-ttk_storage}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-change-me-storage-password}
      STORAGE_FORCE_PATH_STYLE: "true"
      STORAGE_PUBLIC_BASE_URL: http://localhost:${STORAGE_PORT:-9000}
      STORAGE_MAX_FILE_SIZE_MB: ${STORAGE_MAX_FILE_SIZE_MB:-10}
      JWT_SECRET: ${JWT_SECRET:-change-me-with-at-least-32-characters}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-10}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://127.0.0.1:$${PORT:-3000}$${API_PREFIX:-/api/v1}/health"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  email-worker:
    image: ttk-backend-api
    command: ["npm", "run", "worker:email"]
    volumes:
      - .:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: development
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    depends_on:
      redis:
        condition: service_healthy

  search-worker:
    image: ttk-backend-api
    command: ["npm", "run", "worker:search"]
    volumes:
      - .:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-ttk_admin}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-ttk_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-with-at-least-16-characters}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ttk_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-ttk_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ttk_admin} -d ${DB_NAME:-ttk_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.15
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-with-at-least-16-characters}
      MEILI_DB_PATH: /meili_data/data.ms
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-ttk_storage}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-change-me-storage-password}
    ports:
      - "${STORAGE_PORT:-9000}:9000"
      - "${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  api_node_modules:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
